<div class="typing-widget-container">
  <div class="words-container" #wordContainer>
    @for (wordData of currentWords(); track $index) {
      <span
        #wordSpan
        [class.correct]="wordData.status === 'correct'"
        [class.incorrect]="wordData.status === 'incorrect'"
      >
        {{wordData.word}}
      </span>
    }
  </div>
  <div class="input-row">
    <input
      type="text"
      class="word-input"
      [class.incorrect]="badInput()"
      [formControl]="inputControl"
      (keydown.enter)="submitWord()"
      (input)="onInput()"
    />
    <app-timer
      #timer
      (timeout)="onTimeout($event)"
      (reset)="onTimerReset()"/>
  </div>
  @if (showResults()) {
    <app-results [data]="resultsData()"/>
  }
</div>
