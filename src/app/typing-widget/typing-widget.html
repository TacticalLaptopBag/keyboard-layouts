<div class="typing-widget-container">
  <div class="words-container" #wordContainer>
    @for (wordData of currentWords(); track $index) {
      <span
        #wordSpan
        [class.correct]="wordData.status === 'correct'"
        [class.incorrect]="wordData.status === 'incorrect'"
      >
        {{wordData.word}}
      </span>
    }
  </div>
  <input
    type="text"
    class="word-input"
    [value]="inputValue"
    (keydown.enter)="submitWord($event.target)"
    (input)="onInput($event)"
    [disabled]="!wordListReady()"
  />
  <app-timer
    #timer
    (timeout)="onTimeout()"
    (reset)="onTimerReset()"/>
</div>
